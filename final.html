<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Restaurantes CDMX — Mapa de Calor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:690px;height:500px;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f7f6f3;color:#222;font-size:11px;}

#top{display:flex;flex-direction:column;gap:4px;padding:7px 10px 5px;background:#fff;border-bottom:1px solid #e5e7eb;}

#stats{display:flex;gap:6px;}
.stat{background:#f7f6f3;border-radius:6px;padding:4px 8px;min-width:0;flex:1;border:1px solid #eee;}
.stat .val{font-size:14px;font-weight:600;color:#111;line-height:1.2;}
.stat .lbl{font-size:9px;color:#999;margin-top:1px;}

#ctrl{display:flex;flex-wrap:nowrap;align-items:center;gap:6px;overflow-x:auto;}
#ctrl label{display:flex;align-items:center;gap:3px;white-space:nowrap;color:#555;}
#ctrl select{font-size:11px;padding:2px 4px;border:1px solid #d1d5db;border-radius:5px;background:#fff;color:#222;cursor:pointer;height:22px;}
#ctrl input[type=range]{accent-color:#3b82f6;cursor:pointer;width:60px;height:14px;}
#ctrl .val{font-weight:600;color:#111;min-width:20px;}
#ctrl .sep{color:#ddd;margin:0 1px;}

#map{width:690px;height:354px;}

#bottom{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;background:#fff;border-top:1px solid #e5e7eb;}
#legend{display:flex;align-items:center;gap:5px;font-size:10px;color:#777;}
#credit{font-size:9px;color:#bbb;}
</style>
</head>
<body>

<div id="top">
  <div id="stats">
    <div class="stat"><div class="val" id="sVisible">5,000</div><div class="lbl">restaurantes</div></div>
    <div class="stat"><div class="val" id="sAvgRating">—</div><div class="lbl">rating prom.</div></div>
    <div class="stat"><div class="val" id="sTopZona">—</div><div class="lbl">zona más densa</div></div>
    <div class="stat" style="flex:1.4"><div class="val" id="sTopCat">—</div><div class="lbl">categoría top</div></div>
  </div>
  <div id="ctrl">
    <label>Zona
      <select id="selZona">
        <option value="all">Todas</option>
        <option value="Polanco">Polanco</option>
        <option value="Condesa">Condesa</option>
        <option value="Roma Norte">Roma Norte</option>
        <option value="Roma Sur">Roma Sur</option>
        <option value="Centro Histórico">Centro Histórico</option>
        <option value="Coyoacán">Coyoacán</option>
        <option value="Santa Fe">Santa Fe</option>
        <option value="Lomas">Lomas</option>
        <option value="Del Valle">Del Valle</option>
        <option value="Nápoles">Nápoles</option>
        <option value="Doctores">Doctores</option>
        <option value="Tepito">Tepito</option>
        <option value="Xochimilco">Xochimilco</option>
        <option value="Tlalpan">Tlalpan</option>
        <option value="Iztapalapa">Iztapalapa</option>
      </select>
    </label>
    <span class="sep">|</span>
    <label>Categoría
      <select id="selCat">
        <option value="all">Todas</option>
        <option value="Tacos">Tacos</option>
        <option value="Sushi">Sushi</option>
        <option value="Italiana">Italiana</option>
        <option value="Mariscos">Mariscos</option>
        <option value="Café">Café</option>
        <option value="Vegana">Vegana</option>
        <option value="Carnes">Carnes</option>
        <option value="China">China</option>
        <option value="Mexicana">Mexicana</option>
      </select>
    </label>
    <span class="sep">|</span>
    <label>Rating ≥
      <input type="range" id="slRating" min="1" max="5" step="0.5" value="1">
      <span class="val" id="ratingVal">1.0</span>
    </label>
    <span class="sep">|</span>
    <label>Radio
      <input type="range" id="slRadius" min="8" max="45" step="1" value="22">
      <span class="val" id="radVal">22</span>
    </label>
    <span class="sep">|</span>
    <label>Opac.
      <input type="range" id="slOpacity" min="0.2" max="1" step="0.05" value="0.75">
      <span class="val" id="opVal">.75</span>
    </label>
  </div>
</div>

<div id="map"></div>

<div id="bottom">
  <div id="legend">
    <span>Baja</span>
    <canvas id="legBar" width="120" height="7" style="border-radius:3px;border:1px solid #eee;"></canvas>
    <span>Alta densidad</span>
  </div>
  <div id="credit">CartoDB Voyager · OpenStreetMap</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
const ZONAS={
  "Polanco":          {lat:19.4326,lng:-99.1925,spread:0.012,weight:1.4},
  "Condesa":          {lat:19.4116,lng:-99.1741,spread:0.010,weight:1.3},
  "Roma Norte":       {lat:19.4161,lng:-99.1627,spread:0.009,weight:1.3},
  "Roma Sur":         {lat:19.4072,lng:-99.1627,spread:0.008,weight:1.1},
  "Centro Histórico": {lat:19.4326,lng:-99.1332,spread:0.015,weight:1.5},
  "Coyoacán":         {lat:19.3500,lng:-99.1627,spread:0.013,weight:1.0},
  "Santa Fe":         {lat:19.3626,lng:-99.2630,spread:0.014,weight:0.9},
  "Lomas":            {lat:19.4326,lng:-99.2200,spread:0.012,weight:0.9},
  "Del Valle":        {lat:19.3800,lng:-99.1700,spread:0.011,weight:1.0},
  "Nápoles":          {lat:19.3950,lng:-99.1800,spread:0.009,weight:1.0},
  "Doctores":         {lat:19.4150,lng:-99.1450,spread:0.010,weight:0.8},
  "Tepito":           {lat:19.4420,lng:-99.1270,spread:0.009,weight:0.7},
  "Xochimilco":       {lat:19.2570,lng:-99.1030,spread:0.014,weight:0.6},
  "Tlalpan":          {lat:19.2970,lng:-99.1730,spread:0.016,weight:0.6},
  "Iztapalapa":       {lat:19.3550,lng:-99.0600,spread:0.018,weight:0.7},
};
const CATS=["Tacos","Sushi","Italiana","Mariscos","Café","Vegana","Carnes","China","Mexicana"];

let sid=42;
function rng(s){let x=Math.sin(s)*10000;return x-Math.floor(x);}
function rand(){return rng(sid++);}
function gauss(){let u=rng(sid++)+0.0001,v=rng(sid++);return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

const ALL_DATA=[];
const zonaNames=Object.keys(ZONAS);
zonaNames.forEach(zona=>{
  const z=ZONAS[zona];
  const n=Math.round((5000/zonaNames.length)*z.weight);
  for(let i=0;i<n&&ALL_DATA.length<5000;i++){
    ALL_DATA.push({
      lat:z.lat+gauss()*z.spread*0.5,
      lng:z.lng+gauss()*z.spread*0.5,
      zona,
      rating:Math.min(5,Math.max(1,Math.round((3.2+gauss()*0.8)*10)/10)),
      categoria:CATS[Math.floor(rand()*CATS.length)]
    });
  }
});
while(ALL_DATA.length<5000){
  const z=ZONAS[zonaNames[Math.floor(rand()*zonaNames.length)]];
  ALL_DATA.push({lat:z.lat+gauss()*z.spread*0.4,lng:z.lng+gauss()*z.spread*0.4,zona:zonaNames[0],rating:Math.round((3+rand()*2)*10)/10,categoria:CATS[Math.floor(rand()*CATS.length)]});
}

const map=L.map('map',{zoomControl:true,scrollWheelZoom:true,attributionControl:false}).setView([19.38,-99.17],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
  subdomains:'abcd',maxZoom:20
}).addTo(map);

let heatLayer=null;
let lastFiltered=ALL_DATA;

function topCat(data){
  const cnt={};
  data.forEach(d=>{cnt[d.categoria]=(cnt[d.categoria]||0)+1;});
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0]?.[0]||"—";
}
function zonaDensidad(data){
  const cnt={};
  data.forEach(d=>{cnt[d.zona]=(cnt[d.zona]||0)+1;});
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0]?.[0]||"—";
}

function update(){
  const zona=document.getElementById('selZona').value;
  const minR=parseFloat(document.getElementById('slRating').value);
  const cat=document.getElementById('selCat').value;
  const radius=parseInt(document.getElementById('slRadius').value);
  const opacity=parseFloat(document.getElementById('slOpacity').value);

  lastFiltered=ALL_DATA.filter(d=>
    (zona==='all'||d.zona===zona)&&
    d.rating>=minR&&
    (cat==='all'||d.categoria===cat)
  );

  const pts=lastFiltered.map(d=>[d.lat,d.lng,d.rating/5]);
  if(heatLayer) map.removeLayer(heatLayer);
  heatLayer=L.heatLayer(pts,{
    radius,blur:20,maxZoom:17,max:1.0,minOpacity:0.05,
    gradient:{0.2:'#0000b4',0.4:'#0064ff',0.55:'#00dcb4',0.7:'#ffc800',0.85:'#ff6400',1.0:'#dc0000'}
  }).addTo(map);

  if(zona!=='all'){
    const z=ZONAS[zona];
    map.setView([z.lat,z.lng],14);
  } else {
    map.setView([19.38,-99.17],11);
  }

  document.getElementById('sVisible').textContent=lastFiltered.length.toLocaleString();
  document.getElementById('sAvgRating').textContent=lastFiltered.length?(lastFiltered.reduce((s,d)=>s+d.rating,0)/lastFiltered.length).toFixed(1):'—';
  document.getElementById('sTopZona').textContent=zonaDensidad(lastFiltered);
  document.getElementById('sTopCat').textContent=topCat(lastFiltered);
}

document.getElementById('selZona').addEventListener('change',update);
document.getElementById('selCat').addEventListener('change',update);
document.getElementById('slRating').addEventListener('input',function(){document.getElementById('ratingVal').textContent=parseFloat(this.value).toFixed(1);update();});
document.getElementById('slRadius').addEventListener('input',function(){document.getElementById('radVal').textContent=this.value;update();});
document.getElementById('slOpacity').addEventListener('input',function(){document.getElementById('opVal').textContent=parseFloat(this.value).toFixed(2);update();});

(function drawLegend(){
  const lc=document.getElementById('legBar');
  const ctx=lc.getContext('2d');
  const g=ctx.createLinearGradient(0,0,120,0);
  g.addColorStop(0,'#0000b4');g.addColorStop(0.25,'#0064ff');
  g.addColorStop(0.5,'#00dcb4');g.addColorStop(0.7,'#ffc800');
  g.addColorStop(0.85,'#ff6400');g.addColorStop(1,'#dc0000');
  ctx.fillStyle=g;ctx.fillRect(0,0,120,7);
})();

update();
</script>
</body>
</html>
