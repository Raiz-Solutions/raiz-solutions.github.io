
<style>
#ctrl { display:flex; flex-wrap:wrap; gap:10px; align-items:center; padding:12px 0 10px; }
#ctrl label { font-size:13px; color:var(--color-text-secondary); }
#stats { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:10px; margin-bottom:12px; }
.stat { background:var(--color-background-secondary); border-radius:8px; padding:10px 12px; }
.stat .val { font-size:20px; font-weight:500; color:var(--color-text-primary); }
.stat .lbl { font-size:11px; color:var(--color-text-secondary); margin-top:2px; }
#map-wrap { width:100%; height:560px; border-radius:12px; overflow:hidden; border:0.5px solid var(--color-border-tertiary); }
#legend { display:flex; align-items:center; gap:6px; margin-top:10px; font-size:12px; color:var(--color-text-secondary); }
#legend .bar { height:10px; width:160px; border-radius:4px; background:linear-gradient(to right,#2563eb,#06b6d4,#fbbf24,#f97316,#dc2626); }
</style>

<h2 class="sr-only">Mapa de calor interactivo de restaurantes en CDMX sobre mapa de calles tipo Google Maps.</h2>

<div id="ctrl">
  <label>Zona:
    <select id="selZona" style="margin-left:6px;">
      <option value="all">Todas las colonias</option>
      <option value="Polanco">Polanco</option>
      <option value="Condesa">Condesa</option>
      <option value="Roma Norte">Roma Norte</option>
      <option value="Roma Sur">Roma Sur</option>
      <option value="Centro Histórico">Centro Histórico</option>
      <option value="Coyoacán">Coyoacán</option>
      <option value="Santa Fe">Santa Fe</option>
      <option value="Lomas">Lomas</option>
      <option value="Del Valle">Del Valle</option>
      <option value="Nápoles">Nápoles</option>
      <option value="Doctores">Doctores</option>
      <option value="Tepito">Tepito</option>
      <option value="Xochimilco">Xochimilco</option>
      <option value="Tlalpan">Tlalpan</option>
      <option value="Iztapalapa">Iztapalapa</option>
    </select>
  </label>
  <label style="margin-left:12px;">Rating mínimo:
    <input type="range" id="slRating" min="1" max="5" step="0.5" value="1" style="width:90px; margin:0 6px;">
    <span id="ratingVal" style="font-weight:500; font-size:13px;">1.0</span>
  </label>
  <label style="margin-left:12px;">Categoría:
    <select id="selCat" style="margin-left:6px;">
      <option value="all">Todas</option>
      <option value="Tacos">Tacos</option>
      <option value="Sushi">Sushi</option>
      <option value="Italiana">Italiana</option>
      <option value="Mariscos">Mariscos</option>
      <option value="Café">Café</option>
      <option value="Vegana">Vegana</option>
      <option value="Carnes">Carnes</option>
      <option value="China">China</option>
      <option value="Mexicana">Mexicana</option>
    </select>
  </label>
  <label style="margin-left:12px;">Intensidad:
    <input type="range" id="slRadius" min="10" max="40" step="1" value="22" style="width:70px; margin:0 6px;">
    <span id="radVal" style="font-weight:500;font-size:13px;">22</span>px
  </label>
</div>

<div id="stats">
  <div class="stat"><div class="val" id="sTotal">5,000</div><div class="lbl">restaurantes</div></div>
  <div class="stat"><div class="val" id="sVisible">5,000</div><div class="lbl">en vista actual</div></div>
  <div class="stat"><div class="val" id="sAvgRating">—</div><div class="lbl">rating promedio</div></div>
  <div class="stat"><div class="val" id="sTopZona">—</div><div class="lbl">zona más densa</div></div>
</div>

<div id="map-wrap"><div id="map" style="width:100%;height:100%;"></div></div>

<div id="legend">
  <span>Baja densidad</span>
  <div class="bar"></div>
  <span>Alta densidad</span>
</div>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
const ZONAS = {
  "Polanco":          {lat:19.4326,lng:-99.1925,spread:0.012,weight:1.4},
  "Condesa":          {lat:19.4116,lng:-99.1741,spread:0.010,weight:1.3},
  "Roma Norte":       {lat:19.4161,lng:-99.1627,spread:0.009,weight:1.3},
  "Roma Sur":         {lat:19.4072,lng:-99.1627,spread:0.008,weight:1.1},
  "Centro Histórico": {lat:19.4326,lng:-99.1332,spread:0.015,weight:1.5},
  "Coyoacán":         {lat:19.3500,lng:-99.1627,spread:0.013,weight:1.0},
  "Santa Fe":         {lat:19.3626,lng:-99.2630,spread:0.014,weight:0.9},
  "Lomas":            {lat:19.4326,lng:-99.2200,spread:0.012,weight:0.9},
  "Del Valle":        {lat:19.3800,lng:-99.1700,spread:0.011,weight:1.0},
  "Nápoles":          {lat:19.3950,lng:-99.1800,spread:0.009,weight:1.0},
  "Doctores":         {lat:19.4150,lng:-99.1450,spread:0.010,weight:0.8},
  "Tepito":           {lat:19.4420,lng:-99.1270,spread:0.009,weight:0.7},
  "Xochimilco":       {lat:19.2570,lng:-99.1030,spread:0.014,weight:0.6},
  "Tlalpan":          {lat:19.2970,lng:-99.1730,spread:0.016,weight:0.6},
  "Iztapalapa":       {lat:19.3550,lng:-99.0600,spread:0.018,weight:0.7},
};

const CATS = ["Tacos","Sushi","Italiana","Mariscos","Café","Vegana","Carnes","China","Mexicana"];

let sid = 42;
function rng(s){ let x=Math.sin(s)*10000; return x-Math.floor(x); }
function rand(){ return rng(sid++); }
function gauss(){ let u=rng(sid++),v=rng(sid++); return Math.sqrt(-2*Math.log(u+0.0001))*Math.cos(2*Math.PI*v); }

const ALL_DATA = [];
const zonaNames = Object.keys(ZONAS);
const perZona = Math.ceil(5000/zonaNames.length);

zonaNames.forEach(zona => {
  const z = ZONAS[zona];
  const n = Math.round(perZona * z.weight);
  for(let i=0;i<n && ALL_DATA.length<5000;i++){
    const lat = z.lat + gauss()*z.spread*0.5;
    const lng = z.lng + gauss()*z.spread*0.5;
    const rating = Math.min(5, Math.max(1, 3.2 + gauss()*0.8));
    ALL_DATA.push({ lat, lng, zona, rating:Math.round(rating*10)/10, categoria:CATS[Math.floor(rand()*CATS.length)] });
  }
});
while(ALL_DATA.length < 5000){
  const z = ZONAS[zonaNames[Math.floor(rand()*zonaNames.length)]];
  ALL_DATA.push({ lat:z.lat+gauss()*z.spread*0.5, lng:z.lng+gauss()*z.spread*0.5, zona:zonaNames[0], rating:Math.round((3+rand()*2)*10)/10, categoria:CATS[Math.floor(rand()*CATS.length)] });
}

const map = L.map('map').setView([19.38, -99.17], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

let heatLayer = null;

function zonaDensidad(data){
  const cnt = {};
  data.forEach(d=>{ cnt[d.zona]=(cnt[d.zona]||0)+1; });
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0]?.[0] || "—";
}

function update(){
  const zona = document.getElementById('selZona').value;
  const minR = parseFloat(document.getElementById('slRating').value);
  const cat  = document.getElementById('selCat').value;
  const rad  = parseInt(document.getElementById('slRadius').value);

  const filtered = ALL_DATA.filter(d =>
    (zona==='all' || d.zona===zona) &&
    d.rating >= minR &&
    (cat==='all' || d.categoria===cat)
  );

  const pts = filtered.map(d=>[d.lat, d.lng, d.rating/5]);

  if(heatLayer) map.removeLayer(heatLayer);
  heatLayer = L.heatLayer(pts, {
    radius: rad,
    blur: 20,
    maxZoom: 17,
    gradient: {0.2:'#2563eb', 0.45:'#06b6d4', 0.65:'#fbbf24', 0.85:'#f97316', 1.0:'#dc2626'}
  }).addTo(map);

  if(zona !== 'all'){
    const z = ZONAS[zona];
    map.setView([z.lat, z.lng], 14);
  } else {
    map.setView([19.38,-99.17], 11);
  }

  document.getElementById('sVisible').textContent = filtered.length.toLocaleString();
  const avgR = filtered.length ? (filtered.reduce((s,d)=>s+d.rating,0)/filtered.length).toFixed(1) : '—';
  document.getElementById('sAvgRating').textContent = avgR;
  document.getElementById('sTopZona').textContent = zonaDensidad(filtered);
}

document.getElementById('selZona').addEventListener('change', update);
document.getElementById('selCat').addEventListener('change', update);
document.getElementById('slRating').addEventListener('input', function(){
  document.getElementById('ratingVal').textContent = parseFloat(this.value).toFixed(1);
  update();
});
document.getElementById('slRadius').addEventListener('input', function(){
  document.getElementById('radVal').textContent = this.value;
  update();
});

update();
</script>
