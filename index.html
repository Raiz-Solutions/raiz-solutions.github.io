<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Mapa de Calor — Restaurantes CDMX</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:sans-serif;background:#f5f3ef;padding:16px;}
h1{font-size:16px;font-weight:500;color:#333;margin-bottom:12px;}
#ctrl{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:10px;}
#ctrl label{font-size:12px;color:#666;}
#ctrl select,#ctrl input[type=range]{font-size:12px;}
#stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:10px;}
.stat{background:#fff;border-radius:8px;padding:8px 10px;border:0.5px solid #ddd;}
.stat .val{font-size:18px;font-weight:500;color:#222;}
.stat .lbl{font-size:11px;color:#888;}
#mapBox{position:relative;width:100%;height:560px;border-radius:12px;overflow:hidden;border:0.5px solid #ccc;background:#e8e0d8;}
#bgCanvas,#heatCanvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#legend{display:flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:#666;}
#legend .bar{height:8px;width:140px;border-radius:4px;}
#tooltip{position:absolute;background:rgba(255,255,255,0.95);border:0.5px solid #ccc;border-radius:6px;padding:6px 10px;font-size:12px;color:#222;pointer-events:none;display:none;white-space:nowrap;z-index:10;}
</style>
</head>
<body>
<h1>Mapa de calor — Restaurantes Ciudad de México (5,000 registros simulados)</h1>

<div id="ctrl">
  <label>Zona:
    <select id="selZona" style="margin-left:4px;">
      <option value="all">Todas</option>
      <option value="Polanco">Polanco</option>
      <option value="Condesa">Condesa</option>
      <option value="Roma Norte">Roma Norte</option>
      <option value="Roma Sur">Roma Sur</option>
      <option value="Centro Histórico">Centro Histórico</option>
      <option value="Coyoacán">Coyoacán</option>
      <option value="Santa Fe">Santa Fe</option>
      <option value="Lomas">Lomas</option>
      <option value="Del Valle">Del Valle</option>
      <option value="Nápoles">Nápoles</option>
      <option value="Doctores">Doctores</option>
      <option value="Tepito">Tepito</option>
      <option value="Xochimilco">Xochimilco</option>
      <option value="Tlalpan">Tlalpan</option>
      <option value="Iztapalapa">Iztapalapa</option>
    </select>
  </label>
  <label style="margin-left:8px;">Rating ≥
    <input type="range" id="slRating" min="1" max="5" step="0.5" value="1" style="width:80px;margin:0 4px;">
    <span id="ratingVal" style="font-weight:500;">1.0</span>
  </label>
  <label style="margin-left:8px;">Categoría:
    <select id="selCat" style="margin-left:4px;">
      <option value="all">Todas</option>
      <option value="Tacos">Tacos</option>
      <option value="Sushi">Sushi</option>
      <option value="Italiana">Italiana</option>
      <option value="Mariscos">Mariscos</option>
      <option value="Café">Café</option>
      <option value="Vegana">Vegana</option>
      <option value="Carnes">Carnes</option>
      <option value="China">China</option>
      <option value="Mexicana">Mexicana</option>
    </select>
  </label>
  <label style="margin-left:8px;">Radio:
    <input type="range" id="slRadius" min="8" max="40" step="1" value="18" style="width:60px;margin:0 4px;">
    <span id="radVal" style="font-weight:500;">18</span>px
  </label>
  <label style="margin-left:8px;">Opacidad:
    <input type="range" id="slOpacity" min="0.3" max="1" step="0.05" value="0.75" style="width:60px;margin:0 4px;">
    <span id="opVal" style="font-weight:500;">0.75</span>
  </label>
</div>

<div id="stats">
  <div class="stat"><div class="val" id="sTotal">5,000</div><div class="lbl">restaurantes</div></div>
  <div class="stat"><div class="val" id="sVisible">5,000</div><div class="lbl">visibles</div></div>
  <div class="stat"><div class="val" id="sAvgRating">—</div><div class="lbl">rating promedio</div></div>
  <div class="stat"><div class="val" id="sTopZona">—</div><div class="lbl">zona más densa</div></div>
</div>

<div id="mapBox">
  <canvas id="bgCanvas"></canvas>
  <canvas id="heatCanvas"></canvas>
  <div id="tooltip"></div>
</div>

<div id="legend">
  <span>Baja densidad</span>
  <canvas id="legBar" width="140" height="8" style="border-radius:4px;"></canvas>
  <span>Alta densidad</span>
</div>

<script>
const ZONAS = {
  "Polanco":          {lat:19.4326,lng:-99.1925,spread:0.012,weight:1.4,color:"#d4e8f0"},
  "Condesa":          {lat:19.4116,lng:-99.1741,spread:0.010,weight:1.3,color:"#d4ecd8"},
  "Roma Norte":       {lat:19.4161,lng:-99.1627,spread:0.009,weight:1.3,color:"#e8dff0"},
  "Roma Sur":         {lat:19.4072,lng:-99.1627,spread:0.008,weight:1.1,color:"#ead8f0"},
  "Centro Histórico": {lat:19.4326,lng:-99.1332,spread:0.015,weight:1.5,color:"#f0e6d4"},
  "Coyoacán":         {lat:19.3500,lng:-99.1627,spread:0.013,weight:1.0,color:"#d8f0e8"},
  "Santa Fe":         {lat:19.3626,lng:-99.2630,spread:0.014,weight:0.9,color:"#f0d8d8"},
  "Lomas":            {lat:19.4326,lng:-99.2200,spread:0.012,weight:0.9,color:"#f0ecd4"},
  "Del Valle":        {lat:19.3800,lng:-99.1700,spread:0.011,weight:1.0,color:"#dce8f0"},
  "Nápoles":          {lat:19.3950,lng:-99.1800,spread:0.009,weight:1.0,color:"#e8f0dc"},
  "Doctores":         {lat:19.4150,lng:-99.1450,spread:0.010,weight:0.8,color:"#f0dce8"},
  "Tepito":           {lat:19.4420,lng:-99.1270,spread:0.009,weight:0.7,color:"#e8e4d4"},
  "Xochimilco":       {lat:19.2570,lng:-99.1030,spread:0.014,weight:0.6,color:"#d4f0d8"},
  "Tlalpan":          {lat:19.2970,lng:-99.1730,spread:0.016,weight:0.6,color:"#ddf0d4"},
  "Iztapalapa":       {lat:19.3550,lng:-99.0600,spread:0.018,weight:0.7,color:"#f0e0d4"},
};

const CATS = ["Tacos","Sushi","Italiana","Mariscos","Café","Vegana","Carnes","China","Mexicana"];

let sid=42;
function rng(s){let x=Math.sin(s)*10000;return x-Math.floor(x);}
function rand(){return rng(sid++);}
function gauss(){let u=rng(sid++)+0.0001,v=rng(sid++);return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

const ALL_DATA=[];
const zonaNames=Object.keys(ZONAS);

zonaNames.forEach(zona=>{
  const z=ZONAS[zona];
  const n=Math.round((5000/zonaNames.length)*z.weight);
  for(let i=0;i<n&&ALL_DATA.length<5000;i++){
    ALL_DATA.push({
      lat:z.lat+gauss()*z.spread*0.5,
      lng:z.lng+gauss()*z.spread*0.5,
      zona, rating:Math.min(5,Math.max(1,Math.round((3.2+gauss()*0.8)*10)/10)),
      categoria:CATS[Math.floor(rand()*CATS.length)]
    });
  }
});
while(ALL_DATA.length<5000){
  const z=ZONAS[zonaNames[Math.floor(rand()*zonaNames.length)]];
  ALL_DATA.push({lat:z.lat+gauss()*z.spread*0.4,lng:z.lng+gauss()*z.spread*0.4,zona:zonaNames[0],rating:Math.round((3+rand()*2)*10)/10,categoria:CATS[Math.floor(rand()*CATS.length)]});
}

const bgC=document.getElementById('bgCanvas');
const htC=document.getElementById('heatCanvas');
const bgCtx=bgC.getContext('2d');
const htCtx=htC.getContext('2d');

const LAT_MIN=19.20,LAT_MAX=19.55,LNG_MIN=-99.32,LNG_MAX=-99.02;

function resize(){
  const W=bgC.parentElement.clientWidth,H=bgC.parentElement.clientHeight;
  bgC.width=W;bgC.height=H;
  htC.width=W;htC.height=H;
  drawBg();drawHeat(lastFiltered);
}

function toXY(lat,lng){
  const W=bgC.width,H=bgC.height;
  return [(lng-LNG_MIN)/(LNG_MAX-LNG_MIN)*W,(1-(lat-LAT_MIN)/(LAT_MAX-LAT_MIN))*H];
}

const CALLES_H=[
  {lat:19.42, lngA:-99.24,lngB:-99.10,w:2.5,color:"#b0a898"},
  {lat:19.427,lngA:-99.22,lngB:-99.155,w:2.5,color:"#b0a898"},
  {lat:19.455,lngA:-99.22,lngB:-99.08,w:1.8,color:"#c0b8a8"},
  {lat:19.396,lngA:-99.22,lngB:-99.09,w:2,color:"#b8b0a0"},
  {lat:19.36, lngA:-99.22,lngB:-99.06,w:1.5,color:"#c8c0b0"},
  {lat:19.335,lngA:-99.18,lngB:-99.05,w:1.5,color:"#c8c0b0"},
  {lat:19.41, lngA:-99.20,lngB:-99.12,w:1.8,color:"#c0b8a8"},
];
const CALLES_V=[
  {lng:-99.170,latA:19.22,latB:19.48,w:2.5,color:"#b0a898"},
  {lng:-99.183,latA:19.34,latB:19.45,w:1.8,color:"#c0b8a8"},
  {lng:-99.133,latA:19.22,latB:19.42,w:1.8,color:"#c0b8a8"},
  {lng:-99.063,latA:19.30,latB:19.44,w:1.8,color:"#c0b8a8"},
  {lng:-99.100,latA:19.30,latB:19.40,w:1.5,color:"#c8c0b0"},
  {lng:-99.245,latA:19.27,latB:19.46,w:1.8,color:"#c0b8a8"},
];
const PARQUES=[
  {name:"Bosque de Chapultepec",lat:19.420,lng:-99.196,r:0.022,color:"#b8d8b0"},
  {name:"Parque México",lat:19.413,lng:-99.172,r:0.006,color:"#b8d8b0"},
  {name:"Viveros",lat:19.349,lng:-99.168,r:0.008,color:"#b8d8b0"},
  {name:"Parque Hundido",lat:19.380,lng:-99.182,r:0.005,color:"#b8d8b0"},
  {name:"Pedregal",lat:19.315,lng:-99.183,r:0.018,color:"#c0d8b0"},
  {name:"Xochimilco",lat:19.258,lng:-99.100,r:0.025,color:"#90c8b8"},
];

function drawBg(){
  const W=bgC.width,H=bgC.height;
  bgCtx.clearRect(0,0,W,H);
  bgCtx.fillStyle="#ede8e0";bgCtx.fillRect(0,0,W,H);
  PARQUES.forEach(p=>{
    const [px,py]=toXY(p.lat,p.lng);
    const rx=(p.r/(LNG_MAX-LNG_MIN))*W,ry=(p.r/(LAT_MAX-LAT_MIN))*H;
    bgCtx.beginPath();bgCtx.ellipse(px,py,rx,ry,0,0,Math.PI*2);
    bgCtx.fillStyle=p.color;bgCtx.fill();
    bgCtx.strokeStyle="#8ab888";bgCtx.lineWidth=0.8;bgCtx.stroke();
    bgCtx.fillStyle="#5a7a58";bgCtx.font="9px sans-serif";bgCtx.textAlign="center";
    bgCtx.fillText(p.name,px,py+4);
  });
  CALLES_H.forEach(c=>{
    const [x0,y0]=toXY(c.lat,c.lngA),[x1,y1]=toXY(c.lat,c.lngB);
    bgCtx.beginPath();bgCtx.moveTo(x0,y0);bgCtx.lineTo(x1,y1);
    bgCtx.strokeStyle=c.color;bgCtx.lineWidth=c.w;bgCtx.stroke();
  });
  CALLES_V.forEach(c=>{
    const [x0,y0]=toXY(c.latA,c.lng),[x1,y1]=toXY(c.latB,c.lng);
    bgCtx.beginPath();bgCtx.moveTo(x0,y0);bgCtx.lineTo(x1,y1);
    bgCtx.strokeStyle=c.color;bgCtx.lineWidth=c.w;bgCtx.stroke();
  });
  Object.entries(ZONAS).forEach(([name,z])=>{
    const [zx,zy]=toXY(z.lat,z.lng);
    const rx=(z.spread*1.6/(LNG_MAX-LNG_MIN))*W,ry=(z.spread*1.6/(LAT_MAX-LAT_MIN))*H;
    bgCtx.beginPath();bgCtx.ellipse(zx,zy,rx,ry,0,0,Math.PI*2);
    bgCtx.fillStyle=z.color+"88";bgCtx.fill();
    bgCtx.strokeStyle=z.color.slice(0,7)+"cc";bgCtx.lineWidth=0.5;bgCtx.stroke();
    bgCtx.fillStyle="#444";bgCtx.font="bold 10px sans-serif";bgCtx.textAlign="center";
    bgCtx.fillText(name,zx,zy);
  });
  bgCtx.fillStyle="#555";bgCtx.font="bold 11px sans-serif";bgCtx.textAlign="left";
  const [cx,cy]=toXY(19.432,LNG_MIN+0.01);
  bgCtx.fillText("Ciudad de México",cx,cy+14);
}

const GRAD_STOPS=[
  {t:0,r:0,g:0,b:180},{t:0.25,r:0,g:100,b:255},{t:0.5,r:0,g:220,b:180},
  {t:0.7,r:255,g:200,b:0},{t:0.85,r:255,g:100,b:0},{t:1,r:220,g:0,b:0},
];
function heatColor(v){
  v=Math.max(0,Math.min(1,v));
  let a=GRAD_STOPS[0],b=GRAD_STOPS[1];
  for(let i=1;i<GRAD_STOPS.length;i++){if(v<=GRAD_STOPS[i].t){a=GRAD_STOPS[i-1];b=GRAD_STOPS[i];break;}b=GRAD_STOPS[i];a=GRAD_STOPS[i];}
  const tt=(b.t===a.t)?0:(v-a.t)/(b.t-a.t);
  return [Math.round(a.r+(b.r-a.r)*tt),Math.round(a.g+(b.g-a.g)*tt),Math.round(a.b+(b.b-a.b)*tt)];
}

let lastFiltered=ALL_DATA;

function drawHeat(data){
  const W=htC.width,H=htC.height;
  htCtx.clearRect(0,0,W,H);
  if(!data||!data.length) return;
  const radius=parseInt(document.getElementById('slRadius').value);
  const opacity=parseFloat(document.getElementById('slOpacity').value);
  const grid=new Float32Array(W*H);
  const r2=radius*radius;
  data.forEach(d=>{
    const [px,py]=toXY(d.lat,d.lng);
    const xi=Math.round(px),yi=Math.round(py);
    const x0=Math.max(0,xi-radius),x1=Math.min(W-1,xi+radius);
    const y0=Math.max(0,yi-radius),y1=Math.min(H-1,yi+radius);
    const w=d.rating/5;
    for(let y=y0;y<=y1;y++) for(let x=x0;x<=x1;x++){const dx=x-xi,dy=y-yi,d2=dx*dx+dy*dy;if(d2<r2){const inf=(1-d2/r2);grid[y*W+x]+=inf*inf*w;}}
  });
  let mx=0;for(let i=0;i<grid.length;i++) if(grid[i]>mx) mx=grid[i];
  if(mx===0) return;
  const imgData=htCtx.createImageData(W,H);const buf=imgData.data;
  for(let i=0;i<grid.length;i++){
    const v=grid[i]/mx;if(v<0.01) continue;
    const [r,g,b]=heatColor(v);const a=Math.round(Math.min(1,v*1.5)*opacity*255);
    buf[i*4]=r;buf[i*4+1]=g;buf[i*4+2]=b;buf[i*4+3]=a;
  }
  htCtx.putImageData(imgData,0,0);
}

function drawLegend(){
  const lc=document.getElementById('legBar');const ctx=lc.getContext('2d');
  const W=lc.width,H=lc.height;const img=ctx.createImageData(W,H);
  for(let x=0;x<W;x++){const v=x/W;const [r,g,b]=heatColor(v);for(let y=0;y<H;y++){const i=(y*W+x)*4;img.data[i]=r;img.data[i+1]=g;img.data[i+2]=b;img.data[i+3]=220;}}
  ctx.putImageData(img,0,0);
}

function zonaDensidad(data){const cnt={};data.forEach(d=>{cnt[d.zona]=(cnt[d.zona]||0)+1;});return Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0]?.[0]||"—";}

function update(){
  const zona=document.getElementById('selZona').value;
  const minR=parseFloat(document.getElementById('slRating').value);
  const cat=document.getElementById('selCat').value;
  lastFiltered=ALL_DATA.filter(d=>(zona==='all'||d.zona===zona)&&d.rating>=minR&&(cat==='all'||d.categoria===cat));
  drawHeat(lastFiltered);
  document.getElementById('sVisible').textContent=lastFiltered.length.toLocaleString();
  const avgR=lastFiltered.length?(lastFiltered.reduce((s,d)=>s+d.rating,0)/lastFiltered.length).toFixed(1):'—';
  document.getElementById('sAvgRating').textContent=avgR;
  document.getElementById('sTopZona').textContent=zonaDensidad(lastFiltered);
}

document.getElementById('selZona').addEventListener('change',update);
document.getElementById('selCat').addEventListener('change',update);
document.getElementById('slRating').addEventListener('input',function(){document.getElementById('ratingVal').textContent=parseFloat(this.value).toFixed(1);update();});
document.getElementById('slRadius').addEventListener('input',function(){document.getElementById('radVal').textContent=this.value;update();});
document.getElementById('slOpacity').addEventListener('input',function(){document.getElementById('opVal').textContent=parseFloat(this.value).toFixed(2);update();});

htC.addEventListener('mousemove',function(e){
  const rect=htC.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  let best=null,bestD=Infinity;
  lastFiltered.forEach(d=>{const [px,py]=toXY(d.lat,d.lng);const dd=(px-mx)**2+(py-my)**2;if(dd<bestD){bestD=dd;best=d;}});
  const tip=document.getElementById('tooltip');
  if(best&&bestD<900){tip.style.display='block';tip.style.left=(mx+12)+'px';tip.style.top=(my-10)+'px';tip.innerHTML=`<strong>${best.zona}</strong><br>Rating: ${best.rating} · ${best.categoria}`;}
  else{tip.style.display='none';}
});
htC.addEventListener('mouseleave',()=>{document.getElementById('tooltip').style.display='none';});
window.addEventListener('resize',resize);
resize();drawLegend();update();
</script>
</body>
</html>
